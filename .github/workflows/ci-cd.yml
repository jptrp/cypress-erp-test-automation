name: CI/CD Pipeline with AWS

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  NODE_VERSION: '18.x'
  AWS_REGION: 'us-east-1'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint
        continue-on-error: true

      - name: Start server
        run: |
          npm start &
          sleep 5
          curl http://localhost:3000/health

      - name: Run API tests
        run: npm run test:api

      - name: Run UI tests
        run: npm run test:ui
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: cypress-results
          path: |
            cypress/videos
            cypress/screenshots
          retention-days: 7

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-report
          path: cypress/results
          retention-days: 30

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  aws-connectivity:
    name: AWS Connectivity Check
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Test AWS CLI
        run: |
          aws --version
          aws sts get-caller-identity

      - name: Check S3 Connectivity
        run: |
          echo "Testing S3 connectivity..."
          aws s3 ls || echo "S3 buckets not accessible or none exist"

      - name: Check EC2 Connectivity
        run: |
          echo "Testing EC2 connectivity..."
          aws ec2 describe-regions --output table

      - name: Check RDS Connectivity
        run: |
          echo "Testing RDS connectivity..."
          aws rds describe-db-instances --output table || echo "No RDS instances found"

      - name: Test AWS Secrets Manager
        run: |
          echo "Testing Secrets Manager connectivity..."
          aws secretsmanager list-secrets --max-results 5 || echo "No secrets or access denied"

      - name: Upload test reports to S3 (Optional)
        run: |
          # Example: Upload test reports to S3
          # aws s3 cp cypress/videos s3://your-bucket/test-results/ --recursive
          echo "S3 upload would happen here in production"

  deploy-staging:
    name: Deploy to Staging (AWS)
    runs-on: ubuntu-latest
    needs: aws-connectivity
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.yourdomain.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts
          path: dist/

      - name: Deploy to AWS Elastic Beanstalk (Example)
        run: |
          echo "Deploying to Elastic Beanstalk..."
          # aws elasticbeanstalk create-application-version \
          #   --application-name erp-app \
          #   --version-label ${{ github.sha }} \
          #   --source-bundle S3Bucket="your-bucket",S3Key="app.zip"
          echo "Deployment command would run here"

      - name: Deploy to AWS ECS (Example)
        run: |
          echo "Deploying to ECS..."
          # aws ecs update-service \
          #   --cluster erp-cluster \
          #   --service erp-service \
          #   --force-new-deployment
          echo "ECS deployment command would run here"

      - name: Verify deployment
        run: |
          echo "Verifying deployment..."
          # curl https://staging.yourdomain.com/health
          echo "Health check would happen here"

  deploy-production:
    name: Deploy to Production (AWS)
    runs-on: ubuntu-latest
    needs: aws-connectivity
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://yourdomain.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          name: build-artifacts
          path: dist/

      - name: Deploy to AWS Lambda (Example)
        run: |
          echo "Deploying to Lambda..."
          # aws lambda update-function-code \
          #   --function-name erp-function \
          #   --zip-file fileb://function.zip
          echo "Lambda deployment command would run here"

      - name: Update AWS CloudFront (Example)
        run: |
          echo "Invalidating CloudFront cache..."
          # aws cloudfront create-invalidation \
          #   --distribution-id YOUR_DISTRIBUTION_ID \
          #   --paths "/*"
          echo "CloudFront invalidation would run here"

      - name: Run smoke tests
        run: |
          echo "Running smoke tests..."
          # npm run test:smoke
          echo "Smoke tests would run here"

      - name: Notify Slack
        if: always()
        run: |
          echo "Sending Slack notification..."
          # Post to Slack webhook
          echo "Status: Deployment completed"

  security-scan:
    name: Security & Vulnerability Scan
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run Snyk Security Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Upload security results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: security-results
          path: snyk-results.json
          retention-days: 30

  performance-test:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Start server
        run: |
          npm start &
          sleep 5

      - name: Run performance tests
        run: |
          echo "Running performance tests..."
          # npx artillery run performance-test.yml
          echo "Performance tests would run here"

      - name: Upload performance results
        uses: actions/upload-artifact@v3
        with:
          name: performance-results
          path: performance-report.html
          retention-days: 30
